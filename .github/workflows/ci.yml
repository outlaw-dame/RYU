name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - fix/activitypub-graph-ingestion

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Auth contract harness
        run: npm run auth:contracts

      - name: Auth backend smoke
        run: npm run auth:smoke

      - name: Search evaluation guardrails
        run: npm run search:eval

      - name: Unit and UI smoke tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser E2E smoke
        run: npm run test:e2e

      - name: Build
        run: npm run build

      # Keep this final comment as a harmless place to retrigger CI when needed.
